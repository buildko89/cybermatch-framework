[pytest]
norecursedirs =
    work_git
    output
    __pycache__
    .pytest_cache
    .pytest_tmp
    .pytest_cache_runtime
markers =
    smoke: fast smoke tests
    phase1: Phase1 tests
    phase2: Phase2 tests
    phase3: Phase3 tests
    phase4: Phase4 tests
    phase5: Phase5 tests
    phase8: Phase8 tests
    phase83: Phase8.3 benchmark suite tests
    phase84: Phase8.4 topology library tests
    phase85: Phase8.5 standard benchmark tests
    scenario: Scenario import tests
    benchmark: Benchmark suite tests
    topology: Topology library tests
    slow: slow end-to-end evaluation tests
