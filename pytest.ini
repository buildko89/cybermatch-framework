[pytest]
norecursedirs =
    work_git
    output
    __pycache__
    .pytest_cache
    .pytest_tmp
    .pytest_cache_runtime
markers =
    smoke: fast smoke tests
    phase1: Phase1 tests
    phase2: Phase2 tests
    phase3: Phase3 tests
    phase4: Phase4 tests
    phase5: Phase5 tests
    slow: slow end-to-end evaluation tests
